<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="2nd Brain">
  <meta name="theme-color" content="#0f0f23">
  <title>Second Brain Capture</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background-color: #0f0f23;
      color: #e0e0e0;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      overscroll-behavior: none;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    html { height: -webkit-fill-available; }
    input { font-family: 'JetBrains Mono', monospace; }
    input::placeholder { color: #3a3a5a; }

    .app { padding: 0 20px 32px; max-width: 500px; margin: 0 auto; }
    .header { display: flex; align-items: center; justify-content: space-between; padding: 20px 0 12px; }
    .header h1 { font-size: 22px; font-weight: 700; line-height: 1.2; }
    .header p { color: #4a4a6a; font-size: 12px; margin-top: 2px; }
    .settings-btn {
      width: 36px; height: 36px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.08);
      background: #1a1a2e; cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 16px; color: #6c63ff;
    }

    .status-badges { display: flex; gap: 8px; padding-bottom: 16px; }
    .badge {
      font-size: 11px; padding: 3px 8px; border-radius: 6px;
    }
    .badge.on { background: rgba(46,204,113,0.1); color: #2ecc71; }
    .badge.off { background: rgba(255,68,68,0.1); color: #ff4444; }
    .badge.pending { background: rgba(255,170,0,0.1); color: #ffaa00; }

    .input-card {
      background: #1a1a2e; border-radius: 16px; border: 1px solid rgba(255,255,255,0.06); overflow: hidden;
    }
    .input-label {
      padding: 6px 16px; border-bottom: 1px solid rgba(255,255,255,0.04);
      color: #4a4a6a; font-size: 12px;
    }
    .input-row { display: flex; align-items: center; }
    .input-row input {
      flex: 1; padding: 14px 16px; border: none; outline: none; background: transparent;
      color: #e0e0e0; font-size: 15px;
    }
    .clear-btn {
      padding: 8px 12px; border: none; background: none; cursor: pointer;
      color: #4a4a6a; font-size: 18px;
    }

    .capture-btn {
      width: 100%; padding: 16px; border-radius: 14px; border: none; cursor: pointer;
      font-size: 16px; font-weight: 700; font-family: 'DM Sans', sans-serif;
      transition: all 0.3s ease; margin-top: 16px;
    }
    .capture-btn.ready { background: linear-gradient(135deg, #6c63ff, #5a52d5); color: white; }
    .capture-btn.disabled { background: linear-gradient(135deg, #2a2a4a, #1a1a3a); color: #4a4a6a; }
    .capture-btn.loading { background: linear-gradient(135deg, #3a3a5a, #2a2a4a); color: white; opacity: 0.8; }

    .type-hint { text-align: center; margin-top: 12px; font-size: 12px; }

    .error-box {
      background: rgba(255,68,68,0.08); border-radius: 12px; border: 1px solid rgba(255,68,68,0.2);
      padding: 12px 16px; margin-top: 16px;
    }
    .error-box p { color: #ff6666; font-size: 13px; }

    .howto {
      margin-top: 24px; padding: 16px; background: #12122a; border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.04);
    }
    .howto h3 {
      color: #4a4a6a; font-size: 12px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.05em; margin-bottom: 10px;
    }
    .howto-step { display: flex; align-items: flex-start; gap: 12px; margin-top: 8px; }
    .howto-step span.icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
    .howto-step span.text { color: #6a6a8a; font-size: 13px; line-height: 1.4; }

    /* Result view */
    .result-header { text-align: center; padding: 12px 0; }
    .result-header .check { font-size: 40px; margin-bottom: 8px; }
    .result-header .label { color: #2ecc71; font-size: 14px; font-weight: 600; }

    .content-card {
      background: #1a1a2e; border-radius: 16px; border: 1px solid rgba(255,255,255,0.06);
      overflow: hidden; margin-top: 16px;
    }
    .content-card-header {
      padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .content-card-header .meta { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .type-badge {
      color: white; font-size: 10px; font-weight: 700; padding: 2px 8px;
      border-radius: 4px; text-transform: uppercase;
    }
    .word-count { color: #666680; font-size: 12px; }
    .content-card-header h3 { color: #e0e0e0; font-size: 15px; font-weight: 600; line-height: 1.3; }
    .content-preview {
      padding: 12px 16px; max-height: 200px; overflow-y: auto;
      color: #8888aa; font-size: 13px; line-height: 1.5;
    }

    .action-btn {
      width: 100%; padding: 14px; border-radius: 14px; border: none; cursor: pointer;
      font-size: 15px; font-weight: 600; font-family: 'DM Sans', sans-serif;
      margin-top: 8px;
    }
    .action-btn.primary { background: linear-gradient(135deg, #6c63ff, #5a52d5); color: white; }
    .action-btn.secondary {
      background: transparent; border: 1px solid rgba(108,99,255,0.3); color: #6c63ff;
    }
    .action-btn.secondary.copied { color: #2ecc71; border-color: rgba(46,204,113,0.3); }
    .action-btn.ghost {
      background: transparent; border: none; color: #666680; font-size: 14px;
      padding: 12px;
    }

    /* Settings overlay */
    .overlay {
      position: fixed; inset: 0; z-index: 50; display: flex; align-items: flex-end;
      justify-content: center; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
    }
    .settings-panel {
      width: 100%; max-width: 28rem; margin: 0 16px 16px; border-radius: 16px;
      background: #1a1a2e; border: 1px solid rgba(255,255,255,0.08); overflow: hidden;
    }
    .settings-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .settings-header h2 { font-size: 17px; font-weight: 600; }
    .done-btn {
      color: #6c63ff; font-size: 15px; font-weight: 500; background: none;
      border: none; cursor: pointer; font-family: 'DM Sans', sans-serif;
    }
    .settings-body { padding: 16px 20px; }
    .field { margin-bottom: 20px; }
    .field label {
      color: #8888aa; font-size: 12px; font-weight: 500; text-transform: uppercase;
      letter-spacing: 0.05em; display: block;
    }
    .field .hint { color: #666680; font-size: 11px; margin: 2px 0 6px; }
    .field input {
      width: 100%; padding: 10px 12px; border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.08); background: #0f0f23;
      color: #e0e0e0; font-size: 14px; outline: none;
    }
    .save-btn {
      width: 100%; padding: 12px; border-radius: 12px; border: none; cursor: pointer;
      color: white; font-size: 15px; font-weight: 600; font-family: 'DM Sans', sans-serif;
      transition: all 0.3s ease;
    }
    .save-btn.normal { background: linear-gradient(135deg, #6c63ff, #5a52d5); }
    .save-btn.saved { background: linear-gradient(135deg, #2ecc71, #27ae60); }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3); border-top-color: white;
      border-radius: 50%; animation: spin 0.8s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ─── URL Detection ───────────────────────────────────────
    function detectUrlType(url) {
      try {
        const u = new URL(url.trim());
        if (u.hostname.includes("youtube.com") || u.hostname.includes("youtu.be")) return "youtube";
        if (u.pathname.endsWith(".pdf")) return "pdf";
        return "article";
      } catch { return null; }
    }

    function extractVideoId(url) {
      try {
        const u = new URL(url.trim());
        if (u.hostname.includes("youtu.be")) return u.pathname.slice(1);
        if (u.searchParams.has("v")) return u.searchParams.get("v");
        if (u.pathname.includes("/embed/")) return u.pathname.split("/embed/")[1];
        if (u.pathname.includes("/shorts/")) return u.pathname.split("/shorts/")[1];
      } catch {}
      return null;
    }

    // ─── API Calls ───────────────────────────────────────────
    async function fetchYouTubeTranscript(url, apiKey) {
      const videoId = extractVideoId(url);
      if (!videoId) throw new Error("Could not extract video ID from URL");

      const resp = await fetch("https://www.youtube-transcript.io/api/transcripts", {
        method: "POST",
        headers: { "Authorization": "Basic " + apiKey, "Content-Type": "application/json" },
        body: JSON.stringify({ ids: [videoId] }),
      });

      if (!resp.ok) {
        const errText = await resp.text();
        throw new Error("Transcript API error (" + resp.status + "): " + errText);
      }

      const data = await resp.json();

      if (Array.isArray(data) && data.length > 0) {
        const entry = data[0];
        const title = entry.title || "Unknown Title";
        let transcript = "";

        const segments = entry.tracks || entry.segments || [];
        if (Array.isArray(segments) && segments.length > 0) {
          if (segments[0]?.transcript) {
            transcript = segments[0].transcript.map(s => s.text || s.value || "").join(" ");
          } else {
            transcript = segments.map(s => s.text || s.value || "").join(" ");
          }
        } else if (typeof entry.text === "string") {
          transcript = entry.text;
        } else if (typeof entry.transcript === "string") {
          transcript = entry.transcript;
        }

        return { title, transcript, videoId, type: "youtube" };
      }
      throw new Error("Unexpected response format from Transcript API");
    }

    async function fetchArticleContent(url, apiKey) {
      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 4096,
          tools: [{ type: "web_search_20250305", name: "web_search" }],
          messages: [{
            role: "user",
            content: "Fetch the web page at this URL and extract the main article/content text. Remove all navigation, ads, sidebars, footers, and boilerplate. Return ONLY a JSON object with two fields: \"title\" (the article title) and \"content\" (the full article text). No markdown, no commentary. URL: " + url,
          }],
        }),
      });

      if (!resp.ok) {
        const errText = await resp.text();
        throw new Error("Anthropic API error (" + resp.status + "): " + errText);
      }

      const data = await resp.json();
      const textBlocks = data.content.filter(b => b.type === "text").map(b => b.text).join("\n");

      try {
        const jsonMatch = textBlocks.match(/\{[\s\S]*\}/);
        if (jsonMatch) {
          const parsed = JSON.parse(jsonMatch[0]);
          return { title: parsed.title || "Untitled Article", transcript: parsed.content || textBlocks, type: "article" };
        }
      } catch {}

      return { title: "Untitled Article", transcript: textBlocks, type: "article" };
    }

    // ─── Format output ───────────────────────────────────────
    function formatOutput(result, sourceUrl) {
      const now = new Date().toISOString();
      return [
        "---",
        "source_type: " + result.type,
        "source_url: " + sourceUrl,
        "source_title: " + result.title,
        "captured_at: " + now,
        "word_count: " + result.transcript.split(/\s+/).length,
        result.videoId ? "video_id: " + result.videoId : null,
        "---", "",
        result.transcript,
      ].filter(Boolean).join("\n");
    }

    function generateFilename(result) {
      const date = new Date().toISOString().slice(0, 10);
      const slug = (result.title || "untitled").toLowerCase().replace(/[^\w\s-]/g, "").replace(/[\s-]+/g, "_").slice(0, 60);
      return date + "-" + slug + ".txt";
    }

    // ─── Settings Component ──────────────────────────────────
    function Settings({ onClose }) {
      const [anthropicKey, setAnthropicKey] = useState(localStorage.getItem("sb_anthropic_key") || "");
      const [transcriptKey, setTranscriptKey] = useState(localStorage.getItem("sb_transcript_key") || "");
      const [folderId, setFolderId] = useState(localStorage.getItem("sb_capture_folder_id") || "");
      const [saved, setSaved] = useState(false);

      const save = () => {
        localStorage.setItem("sb_anthropic_key", anthropicKey.trim());
        localStorage.setItem("sb_transcript_key", transcriptKey.trim());
        localStorage.setItem("sb_capture_folder_id", folderId.trim());
        setSaved(true);
        setTimeout(() => setSaved(false), 2000);
      };

      return (
        <div className="overlay" onClick={(e) => e.target === e.currentTarget && onClose()}>
          <div className="settings-panel">
            <div className="settings-header">
              <h2>Settings</h2>
              <button className="done-btn" onClick={onClose}>Done</button>
            </div>
            <div className="settings-body">
              <div className="field">
                <label>Anthropic API Key</label>
                <p className="hint">For article extraction. Get one at console.anthropic.com</p>
                <input value={anthropicKey} onChange={e => setAnthropicKey(e.target.value)} type="password" placeholder="sk-ant-..." />
              </div>
              <div className="field">
                <label>YouTube Transcript API Key</label>
                <p className="hint">From youtube-transcript.io — free tier available</p>
                <input value={transcriptKey} onChange={e => setTranscriptKey(e.target.value)} type="password" placeholder="your-api-token" />
              </div>
              <div className="field">
                <label>Google Drive Capture Folder ID</label>
                <p className="hint">The folder ID from your SecondBrain/Capture/ URL</p>
                <input value={folderId} onChange={e => setFolderId(e.target.value)} placeholder="1kQNClS0JmPCK8..." />
              </div>
              <button className={"save-btn " + (saved ? "saved" : "normal")} onClick={save}>
                {saved ? "✓ Saved" : "Save Settings"}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ─── Result Component ────────────────────────────────────
    function ResultView({ result, sourceUrl, onReset }) {
      const [copied, setCopied] = useState(false);
      const formatted = formatOutput(result, sourceUrl);
      const filename = generateFilename(result);
      const wordCount = result.transcript.split(/\s+/).length;
      const typeColor = result.type === "youtube" ? "#ff4444" : "#6c63ff";
      const typeLabel = result.type === "youtube" ? "YouTube Transcript" : "Article";

      const copyToClipboard = async () => {
        try {
          await navigator.clipboard.writeText(formatted);
        } catch {
          const ta = document.createElement("textarea");
          ta.value = formatted;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand("copy");
          document.body.removeChild(ta);
        }
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      };

      const downloadFile = () => {
        const blob = new Blob([formatted], { type: "text/plain" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = filename; a.click();
        URL.revokeObjectURL(url);
      };

      return (
        <div>
          <div className="result-header">
            <div className="check">✓</div>
            <div className="label">Content extracted</div>
          </div>
          <div className="content-card">
            <div className="content-card-header">
              <div className="meta">
                <span className="type-badge" style={{backgroundColor: typeColor}}>{typeLabel}</span>
                <span className="word-count">{wordCount.toLocaleString()} words</span>
              </div>
              <h3>{result.title}</h3>
            </div>
            <div className="content-preview">
              {result.transcript.slice(0, 500)}{result.transcript.length > 500 && "..."}
            </div>
          </div>
          <button className="action-btn primary" onClick={downloadFile} style={{marginTop: "16px"}}>
            📥 Download as {filename}
          </button>
          <button className={"action-btn secondary" + (copied ? " copied" : "")} onClick={copyToClipboard}>
            {copied ? "✓ Copied to clipboard" : "📋 Copy to clipboard"}
          </button>
          <button className="action-btn ghost" onClick={onReset}>← Capture another</button>
        </div>
      );
    }

    // ─── Main App ────────────────────────────────────────────
    function App() {
      const [url, setUrl] = useState("");
      const [status, setStatus] = useState("idle");
      const [result, setResult] = useState(null);
      const [error, setError] = useState(null);
      const [showSettings, setShowSettings] = useState(false);
      const [urlType, setUrlType] = useState(null);

      const hasTranscriptKey = !!localStorage.getItem("sb_transcript_key");
      const hasAnthropicKey = !!localStorage.getItem("sb_anthropic_key");

      const processUrl = async (inputUrl) => {
        const trimmed = inputUrl.trim();
        if (!trimmed) return;

        setStatus("detecting"); setError(null); setResult(null);
        const type = detectUrlType(trimmed);
        setUrlType(type);

        if (!type) { setError("Not a valid URL"); setStatus("error"); return; }
        if (type === "youtube" && !hasTranscriptKey) {
          setError("YouTube Transcript API key not configured. Tap ⚙ to add it.");
          setStatus("error"); return;
        }
        if (type === "article" && !hasAnthropicKey) {
          setError("Anthropic API key not configured. Tap ⚙ to add it.");
          setStatus("error"); return;
        }

        setStatus("extracting");
        try {
          let res;
          if (type === "youtube") {
            res = await fetchYouTubeTranscript(trimmed, localStorage.getItem("sb_transcript_key"));
          } else if (type === "article") {
            res = await fetchArticleContent(trimmed, localStorage.getItem("sb_anthropic_key"));
          } else if (type === "pdf") {
            setError("PDF extraction coming soon.");
            setStatus("error"); return;
          }
          setResult(res); setStatus("done");
        } catch (err) {
          setError(err.message); setStatus("error");
        }
      };

      const reset = () => { setUrl(""); setStatus("idle"); setResult(null); setError(null); setUrlType(null); };

      const statusMsg = status === "detecting" ? "Detecting content type..." :
        status === "extracting" ? (urlType === "youtube" ? "Extracting transcript..." : "Extracting article content...") : "";

      return (
        <div className="app">
          <div className="header">
            <div>
              <h1>Second Brain</h1>
              <p>Capture · Resolve · Store</p>
            </div>
            <button className="settings-btn" onClick={() => setShowSettings(true)}>⚙</button>
          </div>

          <div className="status-badges">
            <span className={"badge " + (hasTranscriptKey ? "on" : "off")}>
              {hasTranscriptKey ? "●" : "○"} YouTube
            </span>
            <span className={"badge " + (hasAnthropicKey ? "on" : "off")}>
              {hasAnthropicKey ? "●" : "○"} Articles
            </span>
            <span className="badge pending">◐ GDrive (soon)</span>
          </div>

          {status === "done" && result ? (
            <ResultView result={result} sourceUrl={url} onReset={reset} />
          ) : (
            <div>
              <div className="input-card">
                <div className="input-label">Paste a URL to capture</div>
                <div className="input-row">
                  <input
                    value={url}
                    onChange={e => setUrl(e.target.value)}
                    onKeyDown={e => e.key === "Enter" && processUrl(url)}
                    placeholder="https://youtube.com/watch?v=..."
                    autoFocus
                  />
                  {url && <button className="clear-btn" onClick={() => { setUrl(""); setError(null); setStatus("idle"); }}>✕</button>}
                </div>
              </div>

              <button
                className={"capture-btn " + (!url.trim() ? "disabled" : (status === "extracting" || status === "detecting") ? "loading" : "ready")}
                onClick={() => processUrl(url)}
                disabled={!url.trim() || status === "extracting" || status === "detecting"}>
                {(status === "detecting" || status === "extracting")
                  ? <span><span className="spinner"></span>{statusMsg}</span>
                  : "Capture"}
              </button>

              {url.trim() && status === "idle" && (
                <div className="type-hint">
                  {detectUrlType(url.trim()) === "youtube" && <span style={{color:"#ff4444"}}>▶ YouTube — will extract transcript</span>}
                  {detectUrlType(url.trim()) === "article" && <span style={{color:"#6c63ff"}}>📄 Article — will extract content</span>}
                  {detectUrlType(url.trim()) === "pdf" && <span style={{color:"#ffaa00"}}>📑 PDF — coming soon</span>}
                  {!detectUrlType(url.trim()) && <span style={{color:"#ff4444"}}>Not a valid URL</span>}
                </div>
              )}

              {error && <div className="error-box"><p>{error}</p></div>}

              <div className="howto">
                <h3>How it works</h3>
                {[
                  ["📋", "Paste a URL from YouTube or any website"],
                  ["⚡", "Content is extracted automatically"],
                  ["💾", "Save the file to GDrive SecondBrain/Capture/"],
                  ["🧠", "Second Brain processes it on next run"],
                ].map(([icon, text], i) => (
                  <div className="howto-step" key={i}>
                    <span className="icon">{icon}</span>
                    <span className="text">{text}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {showSettings && <Settings onClose={() => setShowSettings(false)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("app")).render(<App />);
  </script>
</body>
</html>
